name: doctrine-deadlock-retry-bundle
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doctrine-deadlock-retry-bundle-php
    working_dir: /app
    volumes:
      - .:/app
      - composer-cache:/root/.composer/cache
      - coverage-data:/app/coverage
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
    command: ["tail", "-f", "/dev/null"]
    networks:
      - doctrine-deadlock-retry-bundle-network

volumes:
  composer-cache:
    driver: local
  coverage-data:
    driver: local

networks:
  doctrine-deadlock-retry-bundle-network:
    driver: bridge
